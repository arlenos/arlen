# cargo-deny configuration (licensing-strategy.md "Monorepo mechanics").
#
# The license gate over the whole dependency tree: every crate Arlen builds must
# resolve to an SPDX id on the `allow` list below, so a dependency under an
# incompatible or unknown license fails CI rather than slipping into an AGPL
# distribution. cargo-deny 0.18.4+ uses the v2 schema and requires explicit GNU
# versions (`GPL-3.0-only`, never the ambiguous `GPL-3.0`).
#
# The list is the initial allowlist: our own first-party + bundled-fork licenses
# plus the well-known permissive families AGPL-compatible dependencies carry. The
# first real `cargo deny check licenses` on a build host reconciles it against the
# actual resolved tree (this repo's tooling host has cargo-deny unavailable, so the
# set here is authored from the known dependency families, not yet machine-verified).

[graph]
all-features = true

[licenses]
version = 2
# Refuse a crate whose license expression we cannot confidently parse, rather than
# guess; a low confidence match is treated as unknown and must be clarified.
confidence-threshold = 0.9
allow = [
    # First-party + bundled forks (the per-component map).
    "AGPL-3.0-only",
    "GPL-3.0-only",
    "GPL-2.0-only",
    "Apache-2.0",
    # Permissive families AGPL-compatible dependencies use.
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "Apache-2.0 WITH LLVM-exception",
    # Data license on the Mozilla CA bundle shipped by webpki-roots, pulled in
    # transitively by every Rust HTTP stack (reqwest, ureq via ort).
    "CDLA-Permissive-2.0",
]

# Some crates ship a license file rather than an SPDX expression cargo-deny can
# read (the canonical example is `ring`, whose LICENSE bundles ISC/MIT/OpenSSL).
# Clarifications are added here as the first real run surfaces them, e.g.:
#   [[licenses.clarify]]
#   crate = "ring"
#   expression = "ISC AND MIT AND OpenSSL"
#   license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Advisory by default; tighten with specific bans as the dep policy firms up.
multiple-versions = "allow"
wildcards = "allow"

[advisories]
version = 2

[sources]
# Source-gating is advisory for now: the workspace pulls several first-party git
# dependencies (cosmic-protocols, the compositor fork, tough) and gating them
# needs an explicit `allow-git` host list - a follow-up. The license allowlist
# above is the enforced gate; `lint-licenses` runs `check licenses` only.
unknown-registry = "deny"
unknown-git = "allow"
