[package]
license = "AGPL-3.0-only"
name = "arlen-decode-audio"
version = "0.1.0"
edition = "2021"
description = "The sandboxed audio probe worker: reads an encoded audio file on stdin, writes the validated AudioInfo probe frame on stdout (quickview-plan.md)"

[[bin]]
name = "arlen-decode-audio"
path = "src/main.rs"

[lib]
name = "arlen_decode_audio"

[dependencies]
arlen-viewers-core = { path = "../core" }
# Pure-Rust, single-threaded audio probe (fits the tight no-clone seccomp
# profile). Beyond the FLAC/MP3/PCM/Vorbis core: aiff + the mp4/aac path
# (isomp4/aac/alac), so AIFF and m4a/AAC open via this worker. All verified to
# probe UNDER the bwrap+seccomp+Landlock confinement (an earlier "m4a fails
# confined" reading was wrong - the m4a probe succeeds with codec + sample rate;
# only the channel count is 0, since AAC carries it in the decoded
# AudioSpecificConfig, not the probe-time metadata). Default features off.
symphonia = { version = "0.5", default-features = false, features = ["wav", "ogg", "flac", "mp3", "pcm", "vorbis", "aiff", "isomp4", "aac", "alac"] }

[workspace]
