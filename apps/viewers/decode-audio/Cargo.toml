[package]
name = "arlen-decode-audio"
version = "0.1.0"
edition = "2021"
description = "The sandboxed audio probe worker: reads an encoded audio file on stdin, writes the validated AudioInfo probe frame on stdout (quickview-plan.md)"

[[bin]]
name = "arlen-decode-audio"
path = "src/main.rs"

[lib]
name = "arlen_decode_audio"

[dependencies]
arlen-viewers-core = { path = "../core" }
# Pure-Rust, single-threaded audio probe (fits the tight no-clone seccomp
# profile). Beyond the FLAC/MP3/PCM/Vorbis core, `aiff` (verified to probe under
# the confinement) is added so AIFF opens via this worker instead of the
# unimplemented Fallback. NB the mp4/aac path (isomp4+aac) is deliberately NOT
# enabled: it probes unconfined but FAILS under the tight seccomp profile (it
# needs a syscall the allowlist omits), so it stays the long-tail Fallback until
# that is run down. Default features off so only these readers + codecs link.
symphonia = { version = "0.5", default-features = false, features = ["wav", "ogg", "flac", "mp3", "pcm", "vorbis", "aiff"] }

[workspace]
