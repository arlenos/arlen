[package]
name = "arlen-viewers-core"
version = "0.1.0"
edition = "2021"
description = "The minimal viewer's format-detection + decoder-dispatch core: routes a file to the sandboxed decoder that handles it (quickview-plan.md)"

[dependencies]

# The decoder workers self-apply a Landlock ruleset (read-only /usr + /lib, no
# write anywhere) at startup, layered under the mount namespace + seccomp.
[target.'cfg(target_os = "linux")'.dependencies]
landlock = "0.4"

[workspace]
