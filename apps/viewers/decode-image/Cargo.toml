[package]
license = "AGPL-3.0-only"
name = "arlen-decode-image"
version = "0.1.0"
edition = "2021"
description = "The sandboxed image decoder worker: reads an encoded image on stdin, writes the validated RGBA raster frame on stdout (quickview-plan.md)"

[[bin]]
name = "arlen-decode-image"
path = "src/main.rs"

[lib]
name = "arlen_decode_image"

[dependencies]
arlen-viewers-core = { path = "../core" }
# The pure-Rust, single-threaded codec set only: these must fit the tight
# no-clone seccomp profile, so AVIF (C-linked dav1d - routed to the libheif
# worker instead) and exr (pulls rayon) are deliberately excluded. pnm/qoi/dds/
# hdr/ff/tga/ico are pure Rust and let the existing worker open those formats.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp", "bmp", "tiff", "pnm", "qoi", "dds", "hdr", "ff", "tga", "ico"] }

[workspace]
