[package]
name = "lunaris-harness"
version = "0.1.0"
description = "Lunaris OS AI harness app"
authors = ["Lunaris"]
edition = "2021"

[lib]
name = "lunaris_harness_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
