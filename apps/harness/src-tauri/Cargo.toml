[package]
license = "AGPL-3.0-only"
name = "arlen-harness"
version = "0.1.0"
description = "Arlen OS AI harness app"
authors = ["Arlen"]
edition = "2021"

[lib]
name = "arlen_harness_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
# Conversation client for the AI daemon (org.arlen.AI1) over the
# session bus. Tauri ships its own async runtime, so zbus rides on the
# tokio feature and commands are `async fn`.
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["time", "rt", "net", "io-util"] }
# Audit ledger read API for the agent activity timeline. The wire types
# + ReadClient are shared with Settings (S-U4); the per-app command is a
# thin wrapper. (Dedup of the wrapper into a shared crate: follow-up.)
audit-proto = { path = "../../../contracts/audit-proto" }
# Read the AI capability context (read tier + action mode) from ai.toml,
# the same file the ai-daemon enforces its scope from, for the
# always-visible capability indicator (ai-app.md §2.1).
toml = "0.8"
dirs = "5"
# Behaviour discovery + enablement for the agent observability view (A6).
# Reuses the daemon's own loader so the harness shows exactly the set the
# agent would act on, no duplicated wiring.
arlen-ai-skills = { path = "../../../ai/ai-skills" }
# The shared typed artifact envelope: a turn's reply carries `Artifact[]` to the
# chat (the harness redesign's rich-object path). One definition, shared with the
# terminal + the `arlen-artifact` helper; the frontend renders `Message.artifacts`.
arlen-artifact = { path = "../../../contracts/artifact" }
# Decode an image artifact's base64 payload back to raw bytes for Save-to-file.
base64 = "0.22"

[dev-dependencies]
# Temp directories for the mention file-listing/read tests, and the tokio
# test macro for the async command tests.
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
