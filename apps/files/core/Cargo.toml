[package]
license = "AGPL-3.0-only"
name = "arlen-file-browser-core"
version = "0.1.0"
edition = "2021"
description = "Arlen file manager: the embeddable file-browser core (entry model, scoped listing, sort, breadcrumb)"
authors = ["Arlen"]

[lib]

[dependencies]
cap-std = "3"
serde = { version = "1", features = ["derive"] }
thiserror = "1"
percent-encoding = "2"
libc = "0.2"
time = { version = "0.3", features = ["formatting", "local-offset"] }
# Stable, collision-free thumbnail-cache keys (hex SHA-256 of path + mtime).
sha2 = "0.10"
# Content-hash for duplicate detection: BLAKE3 is fast (multi-GB/s) so hashing
# same-size candidates stays cheap.
blake3 = "1"
# Pure-Rust EXIF read/write for the metadata-edit write-back, behind the
# off-by-default `metadata-edit` feature so a lean embedder (the picker) drops it.
little_exif = { version = "0.6", optional = true }
# Archive listing / extract / compress (the browse-into-archive + compress ops).
serde_json = "1"
tar = "0.4"
flate2 = "1"
zip = { version = "2", default-features = false, features = ["deflate"] }

[features]
# The media-metadata-edit write-back (the info panel's editable EXIF tags). Off
# by default: the embeddable browser core stays lean unless an embedder wants it.
metadata-edit = ["dep:little_exif"]

[dev-dependencies]
tempfile = "3"
time = { version = "0.3", features = ["macros"] }

[workspace]
