[package]
license = "AGPL-3.0-only"
name = "arlen-files"
version = "0.1.0"
description = "Arlen OS file manager app"
authors = ["Arlen"]
edition = "2021"

[lib]
name = "arlen_files_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-arlen-shell = { path = "../../../sdk/tauri-plugin-shell" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
# Set the GTK program name to the bundle id before GTK init, so the Wayland
# xdg_toplevel.app_id matches the published menu key (#2). webkit2gtk-4.1 is
# GTK3, which takes the app_id from g_get_prgname(), not the GApplication id.
glib = "0.18"
# The shared file-browser core: real listing, sorting, breadcrumb,
# properties, operations, trash and search. The host wraps each as a
# thin command over a capability-scoped root. The full FM enables
# metadata-edit (the EXIF write-back); only the embedded picker drops it.
arlen-file-browser-core = { path = "../core", features = ["metadata-edit"] }
cap-std = "3"
# Parse the freedesktop trash DeletionDate for the Trash navigation location.
time = { version = "0.3", features = ["parsing", "macros"] }
# Read the AI capability context from ai.toml for the capability
# indicator (same reader as the harness and the terminal).
toml = "0.8"
dirs = "5"
# The sandboxed image thumbnailer (decode in a Landlock+seccomp subprocess). The
# host is the integration point that owns this dependency; the core stays
# decode-free behind its generator seam. `base64` encodes the cached PNG into the
# data-URL the tile's <img> loads.
arlen-ai-sandbox = { path = "../../../ai/ai-sandbox", features = ["thumbnail", "music"] }
base64 = "0.22"
# Encode the file.opened event payload the FM emits on open (the dogfood KG
# trigger: open a file -> file.opened -> knowledge promotes File + ACCESSED_BY).
prost = "0.13"
# Already in the tree via tauri; `sync` carries the semaphore bounding
# concurrent sandboxed decodes.
tokio = { version = "1", features = ["sync"] }
# Archive extraction (bucket B). The host owns these so the lean core stays
# archive-free; entries are written through a cap-std capability at the
# destination, so a traversing entry is refused by construction.
tar = "0.4"
flate2 = "1"
# .zip support (the common cross-platform archive). Default features off so only
# the deflate decompressor links; entries are written through the same
# destination-scoped capability as the tar path, so traversal is refused.
zip = { version = "2", default-features = false, features = ["deflate"] }
# The knowledge-graph client for the info panel's KG sections (provenance: who/
# what accessed a file, via the caller-scoped 0x04 read). Best-effort - the panel
# shows conventional metadata regardless, and an out-of-scope read is empty.
os-sdk = { path = "../../../sdk/os-sdk" }

[dev-dependencies]
tempfile = "3"
