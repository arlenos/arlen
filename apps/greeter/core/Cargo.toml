[package]
license = "AGPL-3.0-only"
name = "arlen-greeter-core"
version = "0.1.0"
edition = "2021"
description = "Arlen greeter: the pure login logic (session discovery, /etc/passwd profile enumeration, the greetd auth conversation, avatar decode, power-action map) the Tauri host wraps as commands. No Tauri/webkit deps, so it is unit-tested in CI."
authors = ["Arlen"]

[lib]

[dependencies]
serde = { version = "1", features = ["derive"] }
log = "0.4"
base64 = "0.22"
arlen-lock-auth = { path = "../../../daemons/lock-auth", default-features = false, features = ["greetd"] }

[dev-dependencies]
tempfile = "3"
greetd_ipc = { version = "0.10", default-features = false, features = ["sync-codec"] }

[workspace]
