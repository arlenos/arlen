[package]
license = "AGPL-3.0-only"
name = "arlen-greeter"
version = "0.1.0"
description = "Arlen OS greeter / login screen"
authors = ["Arlen"]
edition = "2021"

[lib]
name = "arlen_greeter_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
# The pure login logic (unit-tested in CI).
arlen-greeter-core = { path = "../core" }
# GREETD_SOCK_ENV for dialing the greetd socket (the run_login conversation lives
# in the core crate).
arlen-lock-auth = { path = "../../../daemons/lock-auth", default-features = false, features = ["greetd"] }

