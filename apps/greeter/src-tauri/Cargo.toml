[package]
license = "AGPL-3.0-only"
name = "arlen-greeter"
version = "0.1.0"
description = "Arlen OS greeter / login screen"
authors = ["Arlen"]
edition = "2021"

[lib]
name = "arlen_greeter_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
# The greeter's greetd auth conversation reuses the tested GreetdClient; the
# `greetd` feature pulls only greetd_ipc (not PAM/fprintd), so the login screen
# links nothing it does not need to reach the greetd socket.
arlen-lock-auth = { path = "../../../daemons/lock-auth", default-features = false, features = ["greetd"] }

[dev-dependencies]
tempfile = "3"
# For the mock greetd server the run_login test drives (write canned Responses,
# read the client's Requests) - the same protocol crate GreetdClient speaks.
greetd_ipc = { version = "0.10", default-features = false, features = ["sync-codec"] }
