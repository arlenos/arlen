[package]
license = "AGPL-3.0-only"
name = "arlen-meetings-core"
version = "0.1.0"
edition = "2021"
description = "Arlen meetings: the pure, CI-tested meetings core the Tauri host wraps. Holds the on-disk note store (the verifiable AI meeting note persisted + read back, save/load round-trip) that the summarize-and-file flow writes."
authors = ["Arlen"]

[lib]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# The verifiable meeting-note shape the store persists.
arlen-meeting-note = { path = "../../../contracts/meeting-note" }

[dev-dependencies]
# The store round-trip tests build notes from a transcript fixture.
arlen-transcript = { path = "../../../contracts/transcript" }

[workspace]
