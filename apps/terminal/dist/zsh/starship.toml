# Arlen default prompt (starship). Quiet and flat to match the desktop house
# style: the working directory and git on the left, the time and last command's
# duration on the right, a single caret to type at. Colours map to the
# terminal's muted Arlen palette. A user who ships their own starship config or
# prompt (p10k, a custom PS1) replaces this entirely.

add_newline = false
palette = "arlen"

format = "$directory$git_branch$git_status$character"
right_format = "$cmd_duration$time"

[palettes.arlen]
fg = "#c8c9cf"
dim = "#83858d"
blue = "#7d9cc4"
green = "#8fae74"
yellow = "#d4b483"
red = "#c96a6a"

[directory]
style = "blue"
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "…/"
read_only = " ro"
format = "[$path]($style)[$read_only](dim) "

[git_branch]
style = "green"
symbol = ""
format = "[$branch]($style)"

[git_status]
style = "yellow"
format = "[ $all_status$ahead_behind]($style)"
conflicted = "!"
ahead = "^${count}"
behind = "v${count}"
diverged = "^v"
untracked = "?"
modified = "*"
staged = "+"
renamed = "r"
deleted = "x"
stashed = ""

[cmd_duration]
min_time = 2000
style = "dim"
format = "[$duration]($style) "

[time]
disabled = false
style = "dim"
format = "[$time]($style)"
time_format = "%H:%M"

[character]
success_symbol = "[ ❯](fg)"
error_symbol = "[ ❯](red)"
