[package]
name = "arlen-terminal"
version = "0.1.0"
description = "Arlen OS terminal app"
authors = ["Arlen"]
edition = "2021"

[lib]
name = "arlen_terminal_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
# The embeddable IPC contract types + stub handlers. The host wraps
# each stub as a one-line command; the engine replaces the stubs when
# it lands behind the same signatures.
arlen-terminal-core = { path = "../core" }
# Read the AI capability context from ai.toml for the composer's
# capability strip (same reader as the harness).
toml = "0.8"
dirs = "5"
