[package]
name = "arlen-terminal-engine"
version = "0.1.0"
edition = "2021"
description = "Arlen terminal: the concrete VT engine (a shell on a portable-pty PTY) behind the core seam"
authors = ["Arlen"]

[lib]

[dependencies]
arlen-terminal-core = { path = "../core" }
portable-pty = "0.9"
getrandom = "0.2"
# A pure-Rust VT screen model: the PTY reader feeds it the byte stream and the
# host reads back the visible grid as text, so command output renders in the
# webview without the compositor grid-subsurface (terminal.md Option B).
vt100 = "0.15"

[workspace]
