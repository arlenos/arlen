[package]
license = "AGPL-3.0-only"
name = "arlen-system-monitor"
version = "0.1.0"
description = "Arlen OS system monitor - the task manager with a live process + resource feed"
authors = ["Arlen"]
edition = "2021"

[lib]
name = "arlen_system_monitor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-arlen-shell = { path = "../../../sdk/tauri-plugin-shell" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
# The pure task-manager core (/proc model + rate mapping + process actions),
# unit-tested in CI.
arlen-system-monitor-core = { path = "../core" }

# This app is its own standalone crate (not a member of a parent workspace).
[workspace]
