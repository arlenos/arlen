# The curated model catalog - the shipped starter list (local-model-bundle-plan.md).
#
# This is the CURATION only: which models, the task groups they show under, the
# GGUF source the consent-gated downloader fetches, and whether a model is the
# advanced (abliterated / uncensored) grey-zone set hidden behind the explicit
# Advanced door. The Fast / Balanced / Quality tier and the Fits / May-be-slow /
# Won't-fit badge are NOT stored here - the recommender computes them per the
# target hardware from `params_b`. `params_b` is the marketing parameter count;
# the `source` refs are the well-known GGUF quant repos (Tim curates the exact
# refs + the set later - this is the decided starter list, not the final one).
#
# Tier intent (recommender-confirmed on the target box): Llama-3.2-1B is the
# sub-1 GB baked offline-first default; Qwen2.5-3B = Fast; Qwen2.5-7B = the
# Balanced default-upgrade; Qwen2.5-32B = Quality; Qwen2.5-Coder-7B = Coding;
# Ministral-8B = the EU-sovereign featured pick; the Qwen3-8B abliterated entry
# is the Advanced-door model.
#
# Trust fields (supply-chain trust model): every entry is GGUF (data-only, load-safe),
# set here. The `license` + `license_clarity` are human-curated per model (a wrong
# `open` on a research/community-licensed model is a redistribution liability), so
# they are left unset (fail-closed `unknown`) until vetted; the sha256 the downloader
# verifies is pinned against HF-canonical file metadata, never a third-party mirror.

