# Starting permission profile for org.vita3k.Vita3K (a PS Vita emulator).
# It loads game images from local files by function, so it gets Documents and
# Downloads (where games are kept) and no network. No Knowledge Graph access.
[info]
app_id = "org.vita3k.Vita3K"
tier = "third-party"

[filesystem]
documents = true
downloads = true
