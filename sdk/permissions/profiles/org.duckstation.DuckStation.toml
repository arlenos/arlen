# Starting permission profile for org.duckstation.DuckStation (a game-console emulator).
# It loads game images from local files by function, so it gets Documents and
# Downloads (where ROMs are kept) and no network; netplay is opt-in. No
# Knowledge Graph access.
[info]
app_id = "org.duckstation.DuckStation"
tier = "third-party"

[filesystem]
documents = true
downloads = true
