# Starting permission profile for io.github.lime3ds.Lime3DS (a game-console emulator).
# It loads game images from local files by function, so it gets Documents and
# Downloads (where ROMs are kept) and no network; netplay is opt-in. No
# Knowledge Graph access.
[info]
app_id = "io.github.lime3ds.Lime3DS"
tier = "third-party"

[filesystem]
documents = true
downloads = true
