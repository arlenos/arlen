# Starting permission profile for Mullvad Browser (a web browser).
# The open web is its function, so broad network; it saves to Downloads. Its own
# config dir is a launcher grant, not a blanket home grant. No graph.
[info]
app_id = "net.mullvad.MullvadBrowser"
tier = "third-party"

[filesystem]
downloads = true

[network]
allow_all = true
