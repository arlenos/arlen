# Starting permission profile for com.snes9x.Snes9x (a game-console emulator).
# It loads game images from local files by function, so it gets Documents and
# Downloads (where ROMs are kept) and no network; netplay is opt-in. No
# Knowledge Graph access.
[info]
app_id = "com.snes9x.Snes9x"
tier = "third-party"

[filesystem]
documents = true
downloads = true
