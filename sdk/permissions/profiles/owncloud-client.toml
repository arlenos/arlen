# Starting permission profile for a file-sync client. Needs network to reach its
# sync server (user-configured, any host); the local sync folder is a custom path
# the user grants explicitly, so no document-folder access by default. No
# Knowledge Graph. Observe-mode refines it.
[info]
app_id = "owncloud-client"
tier = "third-party"

[network]
allow_all = true
