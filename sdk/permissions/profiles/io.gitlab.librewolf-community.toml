# Starting permission profile for LibreWolf (a privacy-focused Firefox fork). A
# browser's function is the open web, so it gets broad network; it saves to
# Downloads. No Knowledge Graph access. Observe-mode refines it.
[info]
app_id = "io.gitlab.librewolf-community"
tier = "third-party"

[filesystem]
downloads = true

[network]
allow_all = true
