# Starting permission profile for KMail (KDE email client). Talks to arbitrary
# IMAP/SMTP servers, so it gets network; saves attachments to Downloads. Its mail
# store is a launcher/enrollment grant, not a blanket home grant. No graph.
[info]
app_id = "org.kde.kmail2"
tier = "third-party"

[filesystem]
downloads = true

[network]
allow_all = true
