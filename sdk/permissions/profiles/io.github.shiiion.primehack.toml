# Starting permission profile for PrimeHack (a Metroid Prime emulator, a Dolphin
# fork). It loads game images from local files by function, so it gets Documents
# and Downloads (where ROMs are kept) and no network. No Knowledge Graph access.
[info]
app_id = "io.github.shiiion.primehack"
tier = "third-party"

[filesystem]
documents = true
downloads = true
