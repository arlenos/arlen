# Starting permission profile for Ghostty (a GPU-accelerated terminal emulator).
# Like any terminal it runs an interactive shell in the user's environment, so it
# needs the home tree and the network its commands use, granted by function. No
# Knowledge Graph access.
[info]
app_id = "com.ghostty.Ghostty"
tier = "third-party"

[filesystem]
home = true

[network]
allow_all = true
