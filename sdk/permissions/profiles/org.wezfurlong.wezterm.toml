# Starting permission profile for WezTerm (a terminal emulator). Like any terminal
# it runs an interactive shell in the user's environment, so it needs the home tree
# and the network its commands use, granted by function. No Knowledge Graph access.
[info]
app_id = "org.wezfurlong.wezterm"
tier = "third-party"

[filesystem]
home = true

[network]
allow_all = true
