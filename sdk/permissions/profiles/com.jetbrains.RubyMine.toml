# Starting permission profile for RubyMine (a Ruby IDE). Projects live in Documents; the IDE
# fetches packages, plugins and language servers over the network (its function,
# matching the PyCharm sibling). No graph, no media dirs.
[info]
app_id = "com.jetbrains.RubyMine"
tier = "third-party"

[filesystem]
documents = true

[network]
allow_all = true
