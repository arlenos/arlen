# Starting permission profile for Ptyxis (a terminal emulator). A terminal's function
# is an interactive shell in the user's environment - it must reach the home tree to
# run commands there, and the commands a user runs (git/ssh/curl) need the network -
# so both are granted by function. No Knowledge Graph access.
[info]
app_id = "app.devsuite.Ptyxis"
tier = "third-party"

[filesystem]
home = true

[network]
allow_all = true
