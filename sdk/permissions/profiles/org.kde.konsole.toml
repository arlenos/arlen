# Starting permission profile for Konsole (the KDE terminal emulator). Like any
# terminal it runs an interactive shell in the user's environment, so it needs the
# home tree and the network its commands use, granted by function. No Knowledge
# Graph access.
[info]
app_id = "org.kde.konsole"
tier = "third-party"

[filesystem]
home = true

[network]
allow_all = true
