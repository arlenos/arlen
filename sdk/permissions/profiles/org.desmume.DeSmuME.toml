# Starting permission profile for org.desmume.DeSmuME (a Nintendo DS emulator).
# It loads game images from local files by function, so it gets Documents and
# Downloads (where ROMs are kept) and no network. No Knowledge Graph access.
[info]
app_id = "org.desmume.DeSmuME"
tier = "third-party"

[filesystem]
documents = true
downloads = true
