# Starting permission profile for SaveDesktop (a desktop-configuration backup/sync
# tool). It reads and restores config across the home tree by function and can sync
# the archive to a cloud over the network. No Knowledge Graph access.
[info]
app_id = "io.github.vikdevelop.SaveDesktop"
tier = "third-party"

[filesystem]
home = true

[network]
allow_all = true
