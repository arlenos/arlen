# Starting permission profile for Mozilla Thunderbird (email client). A mail
# client talks to arbitrary IMAP/SMTP servers, so it gets network; it saves
# attachments to Downloads. No Knowledge Graph. Its mail store (~/.thunderbird)
# is a launcher/enrollment grant, not a blanket home grant here.
[info]
app_id = "org.mozilla.Thunderbird"
tier = "third-party"

[filesystem]
downloads = true

[network]
allow_all = true
