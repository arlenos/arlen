[package]
name = "arlen-net-guard"
version = "0.1.0"
edition = "2021"
description = "SSRF guard plus per-host egress filter: block private/loopback destinations, pin DNS against rebinding, and forward-proxy a confined process to its declared host allowlist"

[lib]
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["net", "rt", "io-util", "macros", "time", "sync"] }
tokio-util = "0.7"
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["net", "rt", "macros", "io-util", "time", "sync"] }
