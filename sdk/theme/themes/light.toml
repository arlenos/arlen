# Bundled Arlen Light theme.
#
# Schema canonical at sdk/theme/src/file.rs (ArlenThemeFile).

[meta]
id      = "light"
name    = "Arlen Light"
variant = "light"

# A light theme lifts a WHITE card off a GREY field (depth via the card surface
# + shadow_card below), not the dark theme inverted. So the app field is grey,
# cards and inputs are white, the shell sidebar a touch greyer than the field.
[color.bg]
shell   = "#ececef"
app     = "#f5f5f7"
card    = "#ffffff"
overlay = "#1f1f2933"
input   = "#ffffff"

[color.fg]
primary   = "#171717"
secondary = "#525252"
disabled  = "#a3a3a3"
inverse   = "#fafafa"

[color.semantic]
# Monochrome default: accent matches the light foreground, not indigo.
accent         = "#171717"
accent_hover   = "#525252"
accent_pressed = "#3f3f46"
success        = "#16a34a"
warning        = "#ca8a04"
error          = "#dc2626"
info           = "#2563eb"

[color.border]
default = "#e5e5e5"
strong  = "#d4d4d4"

[radius]
chip           = 4
button         = 6
input          = 8
card           = 12
modal          = 16
full           = 9999
window_corners = [12, 12, 12, 12]
intensity      = 1.0

[spacing]
xs = "4px"
sm = "8px"
md = "16px"
lg = "24px"
xl = "32px"

[typography]
font_sans     = "\"Inter Variable\", ui-sans-serif, system-ui, sans-serif"
font_mono     = "\"JetBrainsMono Nerd Font Mono\", \"JetBrains Mono\", ui-monospace, monospace"
size_base     = "14px"
line_height   = "1.5"
weight_normal = 400
weight_medium = 500
weight_bold   = 600

[motion]
duration_fast    = "100ms"
duration_normal  = "200ms"
duration_slow    = "400ms"
easing_default   = "cubic-bezier(0.4, 0, 0.2, 1)"
easing_spring    = "cubic-bezier(0.34, 1.56, 0.64, 1)"

[depth]
shadow_sm    = "0 1px 2px rgba(0, 0, 0, 0.06)"
shadow_md    = "0 4px 12px rgba(0, 0, 0, 0.1)"
shadow_lg    = "0 8px 24px rgba(0, 0, 0, 0.15)"
# Card elevation: the soft lift that gives a white card depth on the grey field.
shadow_card  = "0 1px 2px rgba(24, 24, 27, 0.04), 0 2px 6px rgba(24, 24, 27, 0.06)"
blur_enabled = true

[wm]
active_hint = 1
gaps_inner  = 4
gaps_outer  = 4

[cursor]
theme = "default"
size  = 24
