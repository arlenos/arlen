[package]
license = "AGPL-3.0-only"
name = "arlen-config"
version = "0.1.0"
edition = "2021"
description = "TOML config loader with default merging for Arlen OS"

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
thiserror = "2"
notify = "7"
serde_json = "1"

[dev-dependencies]
tempfile = "3"
