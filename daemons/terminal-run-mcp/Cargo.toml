[package]
license = "AGPL-3.0-only"
name = "arlen-terminal-run-mcp"
version = "0.1.0"
edition = "2021"
description = "Terminal-run MCP server: runs a single user-approved command inside a confined sandbox (no network, no host write, no privilege) with captured output. The sharp edge - always Confirm-gated by the registry, never autonomous"

[[bin]]
name = "arlen-terminal-run-mcp"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
arlen-confiner = { path = "../../sdk/confiner" }
# The per-action consent biscuit: the AI-engine daemon mints one when a run_command
# Confirm is approved; this server verifies it here (bound to the exact command +
# args) against the daemon's published root public key before running anything.
arlen-run-consent-token = { path = "../../contracts/run-consent-token" }
os-sdk = { path = "../../sdk/os-sdk" }
# The seccomp allowlist installed on the confined command via bwrap --seccomp <fd>.
seccompiler = "0.5"
libc = "0.2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "time", "io-util", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
# Mint real consent tokens in the authorize_run tests (a KeyPair to sign with).
biscuit-auth = "6.0.0"

[workspace]
