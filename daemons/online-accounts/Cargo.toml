[package]
name = "online-accounts"
version = "0.1.0"
edition = "2021"
description = "Arlen online-accounts daemon: capability-gated account service (org.arlen.Accounts1)"
authors = ["Arlen"]

[lib]
name = "online_accounts"

[[bin]]
name = "arlen-accountsd"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
thiserror = "1"
serde_json = "1"
async-trait = "0.1"
arlen-permissions = { path = "../../sdk/permissions" }
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "net", "io-util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Token vault crypto: each account's tokens are AEAD-encrypted at rest under a
# per-account subkey HKDF-derived from the daemon's master secret. ChaCha20-
# Poly1305 needs no AES-NI and is constant-time; getrandom supplies the nonce.
chacha20poly1305 = "0.10"
hkdf = "0.12"
sha2 = "0.10"
zeroize = "1"
getrandom = "0.2"

[dev-dependencies]
tempfile = "3"

[workspace]
