[package]
name = "online-accounts"
version = "0.1.0"
edition = "2021"
description = "Arlen online-accounts daemon: capability-gated account service (org.arlen.Accounts1)"
authors = ["Arlen"]

[lib]
name = "online_accounts"

[[bin]]
name = "arlen-accountsd"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
thiserror = "1"
serde_json = "1"
async-trait = "0.1"
arlen-permissions = { path = "../../sdk/permissions" }
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"

[workspace]
