[package]
license = "AGPL-3.0-only"
name = "online-accounts"
version = "0.1.0"
edition = "2021"
description = "Arlen online-accounts daemon: capability-gated account service (org.arlen.Accounts1)"
authors = ["Arlen"]

[lib]
name = "online_accounts"

[[bin]]
name = "arlen-accountsd"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
thiserror = "1"
serde_json = "1"
async-trait = "0.1"
arlen-permissions = { path = "../../sdk/permissions" }
# Content-free audit of the credential handout (GAP-2): GetAccessToken submits a
# structural record (caller + service + outcome, never the token) to arlen-auditd.
audit-proto = { path = "../../contracts/audit-proto" }
zbus = { version = "5", default-features = false, features = ["tokio"] }
notify = "7"
futures-util = { version = "0.3", default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "net", "io-util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Token vault crypto: each account's tokens are AEAD-encrypted at rest under a
# per-account subkey HKDF-derived from the daemon's master secret. ChaCha20-
# Poly1305 needs no AES-NI and is constant-time; getrandom supplies the nonce.
chacha20poly1305 = "0.10"
hkdf = "0.12"
sha2 = "0.10"
zeroize = "1"
arlen-secret-vault = { path = "../../sdk/secret-vault" }
getrandom = "0.2"
# The vault master-secret custody: a persistent 32-byte secret at mode 0600,
# generate-or-load, fail-closed (the reviewed forage-signing primitive; its
# Ed25519 wrapper is incidental, the raw seed serves as the AEAD master).
arlen-forage-signing = { path = "../../forage/signing" }

[dev-dependencies]
tempfile = "3"

[workspace]
