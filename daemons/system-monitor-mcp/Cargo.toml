[package]
name = "arlen-system-monitor-mcp"
version = "0.1.0"
edition = "2021"
description = "System Monitor read-only MCP server: exposes the active process list and resource usage (load, memory) to the AI daemon over a peer-authenticated MCP socket, read from /proc"

[[bin]]
name = "arlen-system-monitor-mcp"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
os-sdk = { path = "../../sdk/os-sdk" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net", "time", "io-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# statvfs for the disk-usage tool (no portable std API for free space).
libc = "0.2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"

[workspace]
