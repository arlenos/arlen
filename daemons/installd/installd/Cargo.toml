[package]
name = "arlen-installd"
version = "0.1.0"
edition = "2021"
description = "User-level install daemon for Arlen apps and modules"

[[bin]]
name = "arlen-installd"
path = "src/main.rs"

[dependencies]
arlen-modules = { path = "../../../sdk/modules" }
arlen-permissions = { path = "../../../sdk/permissions" }
# Content-free audit of install/uninstall (GAP-2): each completed job submits a
# structural record (the action, the source and the outcome, never a filesystem
# path) to arlen-auditd, so software-changing actions land in the ledger.
audit-proto = { path = "../../../contracts/audit-proto" }
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
tar = "0.4"
zstd = "0.13"
dirs = "6"
libc = "0.2"
ed25519-dalek = { version = "2", features = ["std"] }
sha2 = "0.10"

[dev-dependencies]
tempfile = "3"
