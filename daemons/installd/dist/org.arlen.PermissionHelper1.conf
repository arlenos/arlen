<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus access policy for the Arlen permission helper.

  permission-helper runs as root on the system bus (see dist/permission-helper
  .service) and writes the system permission profiles and the inode-keyed
  identity registry (F3 Rung B). Without this file the system bus default-denies
  both owning the name and sending to it, so the helper could not claim
  org.arlen.PermissionHelper1 and installd / settings could never reach it.

  Install to /usr/share/dbus-1/system.d/org.arlen.PermissionHelper1.conf

  The bus policy is only the coarse gate: any local user may send, and the helper
  authorizes every call itself - write_profile/delete_profile/record_identity run
  validate_caller, which resolves the sender PID to its binary against the F3
  caller allowlist (installd, settings) and checks the target uid (a caller may
  only write for its own uid, or any uid as root). Owning the name is restricted
  to root so a non-root process cannot squat it and forge profiles.
-->
<busconfig>
  <policy user="root">
    <allow own="org.arlen.PermissionHelper1"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.arlen.PermissionHelper1"/>
  </policy>
</busconfig>
