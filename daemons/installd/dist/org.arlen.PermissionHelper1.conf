<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus policy for the Arlen permission helper.

  Installed to /usr/share/dbus-1/system.d/org.arlen.PermissionHelper1.conf.
  Without it the helper cannot own its name on a stock system bus (the
  default policy denies ownership and sends), so the service is inert.

  Ownership is restricted to root: the helper runs as root
  (permission-helper.service, User=root) to write the authoritative
  /var/lib/arlen/permissions tree, and no other user may squat the name.

  Sends are opened to ordinary user clients because the intended callers
  (installd, settings) run as the invoking user, not a distinct uid the
  bus can match. The real per-caller restriction is in the helper's own
  validate_caller: it resolves the sender's pid to an app_id through the
  anchored install-path resolver (never a basename substring) and admits
  only installd / settings / the self-test, and a non-root caller may act
  only on its own uid's profile tree. The bus policy is the coarse first
  gate; the anchored check is the authoritative one.
-->
<busconfig>
  <policy user="root">
    <allow own="org.arlen.PermissionHelper1"/>
    <allow send_destination="org.arlen.PermissionHelper1"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.arlen.PermissionHelper1"
           send_interface="org.arlen.PermissionHelper1"/>
    <allow send_destination="org.arlen.PermissionHelper1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow receive_sender="org.arlen.PermissionHelper1"/>
  </policy>
</busconfig>
