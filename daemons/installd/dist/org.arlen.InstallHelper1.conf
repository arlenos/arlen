<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus access policy for the Arlen install helper.

  install-helper runs as root on the system bus (see dist/install-helper.service)
  and performs privileged system installs. Without this file the system bus
  default-denies both owning the name and sending to it, so the helper could not
  claim org.arlen.InstallHelper1 and installd could never reach it.

  Install to /usr/share/dbus-1/system.d/org.arlen.InstallHelper1.conf

  The bus policy is only the coarse gate: any local user may send, and the helper
  authorizes every call itself by resolving the sender PID to its binary against
  the F3 caller allowlist (install_system/uninstall_system/create_desktop_entry
  all run validate_caller first). Owning the name is restricted to root so a
  non-root process cannot squat it and impersonate the helper.
-->
<busconfig>
  <policy user="root">
    <allow own="org.arlen.InstallHelper1"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.arlen.InstallHelper1"/>
  </policy>
</busconfig>
