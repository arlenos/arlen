<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus policy for the Arlen install helper.

  Installed to /usr/share/dbus-1/system.d/org.arlen.InstallHelper1.conf.
  Without it the helper cannot own its name on a stock system bus, so the
  service is inert.

  Ownership is restricted to root: the helper runs as root
  (install-helper.service, User=root) to write /usr/lib/arlen/apps, and no
  other user may squat the name.

  Sends are opened to ordinary user clients because the only intended
  caller (installd) runs as the invoking user. The real per-caller
  restriction is in the helper's own validate_caller: it resolves the
  sender's pid to an app_id through the anchored install-path resolver
  (never a basename substring) and admits only installd / the self-test.
  These verbs are root-privileged install/trash/signature operations, so
  the anchored check is the authoritative gate; the bus policy is the
  coarse first one.
-->
<busconfig>
  <policy user="root">
    <allow own="org.arlen.InstallHelper1"/>
    <allow send_destination="org.arlen.InstallHelper1"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.arlen.InstallHelper1"
           send_interface="org.arlen.InstallHelper1"/>
    <allow send_destination="org.arlen.InstallHelper1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow receive_sender="org.arlen.InstallHelper1"/>
  </policy>
</busconfig>
