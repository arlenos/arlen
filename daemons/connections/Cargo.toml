[package]
license = "AGPL-3.0-only"
name = "connections"
version = "0.1.0"
edition = "2021"
description = "Arlen Connections daemon: the single capability-gated credential authority (org.arlen.Connections1)"
authors = ["Arlen"]

[lib]
name = "connections"

[[bin]]
name = "arlen-connectionsd"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
toml = "0.8"
arlen-secret-vault = { path = "../../sdk/secret-vault" }
audit-proto = { path = "../../contracts/audit-proto" }
arlen-forage-signing = { path = "../../forage/signing" }
zeroize = "1"
arlen-permissions = { path = "../../sdk/permissions" }
biscuit-auth = "6.0.0"
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
audit-proto = { path = "../../contracts/audit-proto", features = ["test-util"] }
tokio = { version = "1", features = ["macros", "rt"] }
