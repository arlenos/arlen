[package]
license = "AGPL-3.0-only"
name = "arlen-lock-auth"
version = "0.1.0"
edition = "2021"
description = "Arlen lock-screen / greeter shared auth backend: the factor-tier enforcement (convenience factors unlock a warm session; only a strong factor releases the home/FDE key). The PAM bridge and the concrete factor backends build on this pure security core."
authors = ["Arlen"]

[lib]
name = "arlen_lock_auth"

[dependencies]
audit-proto = { path = "../../contracts/audit-proto" }
greetd_ipc = { version = "0.10", optional = true, default-features = false, features = ["sync-codec"] }
pam = { version = "0.8", optional = true }
# The fprintd verifier uses zbus's blocking API (default features include the
# self-contained async-io backend), so the synchronous FactorVerifier::verify
# can drive the fprintd D-Bus conversation on its own thread without a runtime.
zbus = { version = "5", optional = true }

[dev-dependencies]

[workspace]

[features]
# Both factor backends are off by default: the pure verify-tier-audit
# composition is what CI builds and tests. `pam` links libpam (the password ->
# systemd-homed key release) and `greetd` pulls greetd_ipc (the greeter's auth
# conversation); each is built and verified on hardware, like PWR-R2's metal path.
pam = ["dep:pam"]
greetd = ["dep:greetd_ipc"]
fprintd = ["dep:zbus"]
