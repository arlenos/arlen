# Permission profile for the AI agent daemon (app id: ai-agent).
#
# Deploy to ~/.config/permissions/ai-agent.toml. The knowledge daemon loads it
# by app id when the agent connects to the graph write socket and mints a token
# from these scopes (Foundation §7.3: the user owns this file, it is the sole
# source of truth for what the agent may touch).
#
# This is the executor go-live grant: the GRAPH scopes the agent mints a token
# from. The first live action under `executor_live = true` is the confirm-gated
# `tidy-downloads` (an `fs.move`), which is bounded by its own declared tool
# scope plus the audit admission, NOT by this graph profile - a file move is not
# a graph write. What this profile grants is the agent's GRAPH access: the read
# scopes below (the context it reads to infer a destination) and the single
# FILE_PART_OF write relation that backs the now-dormant auto-tag carve-out (kept
# wired but retired as the first live curation; the promotion pipeline owns that
# linking). Going live is flipping `executor_live = true` once this file is in
# place; the grant here bounds the blast radius of any graph write.

[info]
app_id = "ai-agent"
tier = "first-party"

[graph]
# The fields the agent reads to infer a destination (tidy-downloads) and to
# prove the dormant carve-out's predicate: a File's id and path, a Project's id
# and root_path (the file exists, the project exists, the file path lies under
# the project root). Field-level, not the whole node, so no other File or
# Project metadata is legible to the agent even once read scopes are enforced at
# the query boundary.
read = [
    "system.File.id",
    "system.File.path",
    "system.Project.id",
    "system.Project.root_path",
]

# The single graph relation the agent may create: File -[FILE_PART_OF]-> Project.
# FILE_PART_OF is a built-in relation the knowledge daemon allows; this is the
# edge the now-dormant auto-tag carve-out writes. Retained though the promotion
# pipeline owns the live linking, so the carve-out stays functional if ever
# re-enabled; it is NOT what the first live action (tidy-downloads) writes.
relations = [
    { from = "system.File", to = "system.Project", type = "FILE_PART_OF" },
]

# Both endpoints are system-owned nodes the agent does not own, so linking them
# needs the privileged all-instances scope. Without this the write socket
# refuses the relation as unanchored (it has no caller-owned endpoint). This is
# the deliberate privilege the grant rests on, kept narrow by the single-relation
# allowlist above: all-instances applies only to FILE_PART_OF between File and
# Project, not to writes in general.
instance_scope = "all"
