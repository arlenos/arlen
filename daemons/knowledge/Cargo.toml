[package]
license = "AGPL-3.0-only"
name = "knowledge"
version = "0.1.0"
edition = "2021"

[[bin]]
# The installed daemon binary. Named arlen-graph-daemon to match the
# convention every other daemon follows (arlen-notifyd, arlen-anomalyd, ...)
# and the name the systemd unit, the docs, and the permissions tier-detection
# already expect. The package stays "knowledge".
name = "arlen-graph-daemon"
path = "src/main.rs"

[[bin]]
# The timeline FUSE helper: serves ~/.timeline by querying the daemon's read
# socket. Run UNFENCED so the SUID `fusermount3` the mount needs still execs;
# the main daemon takes the Landlock + no_new_privs write-fence (which would
# otherwise block that exec). Split out per same-uid-isolation-plan.md option b.
name = "arlen-timeline"
path = "src/bin/arlen-timeline.rs"

[dependencies]
os-sdk = { path = "../../sdk/os-sdk" }
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "migrate"] }
prost = "0.13"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v5", "v7", "serde"] }
# LadybugDB (github.com/LadybugDB/ladybug), the maintained MIT successor to the
# archived upstream KuzuDB - NOT the dead "Vela" fork. Pinned exactly: the Kuzu
# lineage has not stabilized its on-disk format across versions, so a bump is a
# deliberate, tested step (verify the write -> upgrade -> reopen path first), never
# an incidental `cargo update`.
lbug = "=0.15.2"
hmac = "0.12"
sha2 = "0.10"
getrandom = "0.2"
rmp-serde = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_bytes = "0.11"
chrono = { version = "0.4", features = ["serde"] }
fuser = "0.17"
time = { version = "0.3", features = ["formatting", "macros"] }
libc = "0.2"
dirs = "5"
thiserror = "2"
toml = "0.8"
# Format-preserving profile edits for revoke: keep the user's comments/ordering
# and never drop a field the daemon's profile models but a re-serialize would not.
toml_edit = "0.22"
zip = { version = "2", default-features = false, features = ["deflate"] }
notify = { version = "7", default-features = false, features = ["macos_kqueue"] }
shellexpand = "3"
arlen-permissions = { path = "../../sdk/permissions" }
arlen-landlock-fence = { path = "../../sdk/landlock-fence" }
arlen-capsule = { path = "../../contracts/capsule" }
audit-proto = { path = "../../contracts/audit-proto" }
regex = "1"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"
[build-dependencies]
prost-build = "0.13"

[[bench]]
name = "graph_scale"
harness = false

