[package]
name = "arlen-integration-packages"
version = "0.1.0"
edition = "2021"
description = "Arlen integration packages: the adapter interpreter (IP-R2). Parses an untrusted community Settings-adapter manifest and confines its source paths to the user-config allowlist; the format-preserving I/O is arlen-config-format, the write engine and the Settings render build on this."
authors = ["Arlen"]

[lib]
name = "arlen_integration_packages"

[dependencies]
arlen-config-format = { path = "../../sdk/config-format" }
cap-std = "3"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
thiserror = "1"
# Check an Integration Package's `compatible_with` range against the installed
# app version (the manifest's app-compatibility declaration, IP-R5).
semver = "1"

[dev-dependencies]
tempfile = "3"

[workspace]
