[workspace]
resolver = "2"
members = [
    "daemon",
    "protocol",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"
repository = "https://github.com/arlenos/xdg-desktop-portal-arlen"
authors = ["Tim Kicker <tim@arlenos.org>"]

[workspace.dependencies]
zbus = { version = "5", default-features = false, features = ["tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "process", "fs", "net", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
thiserror = "2"
percent-encoding = "2.3"
