[package]
name = "xdg-desktop-portal-arlen"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Arlen backend for xdg-desktop-portal (FileChooser, OpenURI)"

[[bin]]
name = "xdg-desktop-portal-arlen"
path = "src/main.rs"

[dependencies]
xdg-portal-arlen-protocol = { path = "../protocol" }
zbus = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
percent-encoding = { workspace = true }
libc = "0.2"
arlen-screen-capture = { path = "../../../sdk/screen-capture" }
# The org.freedesktop.impl.portal.Print backend (PRN-R2) bridges to the built
# arlen-print service (CUPS); this brings in JobOptions/Duplex/ColorMode + the
# submit surface.
arlen-print = { path = "../../print" }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["test-util", "macros"] }
