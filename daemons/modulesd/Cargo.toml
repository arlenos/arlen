[package]
name = "lunaris-modulesd"
version = "0.1.0"
edition = "2021"
description = "Module Runtime daemon: hosts sandboxed third-party Waypointer/MCP/keybinding modules as WASM components, brokers Tier 2 iframe modules"

[[bin]]
name = "lunaris-modulesd"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "sync", "net", "io-util", "time", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"
dirs = "6"
libc = "0.2"
async-trait = "0.1"

# WASM Component Model runtime. Pinned at 36 because newer releases
# require rustc >= 1.92, while the repo-wide toolchain is 1.90.
wasmtime = { version = "36", features = ["component-model", "async"] }

# Lunaris workspace dependencies.
lunaris-modules = { path = "../sdk/modules" }
lunaris-permissions = { path = "../sdk/permissions" }
os-sdk = { path = "../sdk/os-sdk" }
module-sdk = { path = "../sdk/module-sdk" }
modulesd-proto = { path = "../modulesd-proto" }

[dev-dependencies]
tempfile = "3"

[workspace]
