[package]
license = "AGPL-3.0-only"
name = "arlen-modulesd"
version = "0.1.0"
edition = "2021"
description = "Module Runtime daemon: hosts sandboxed third-party Waypointer/MCP/keybinding modules as WASM components, brokers Tier 2 iframe modules"

[[bin]]
name = "arlen-modulesd"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "sync", "net", "io-util", "time", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"
dirs = "6"
libc = "0.2"
async-trait = "0.1"
arlen-net-guard = { path = "../../sdk/net-guard" }

# Pattern matching for waypointer.search.detect_pattern manifest field.
# Used by handle_search_all to gate which modules see which queries.
regex = "1"

# CSPRNG for Tier 2 iframe nonces (S7.2). OsRng is the system-RNG
# wrapper; using getrandom under the hood. 16 bytes per nonce.
rand = "0.8"

# systemd readiness + socket activation (S7.1, S7.6). Pure-Rust, no
# libsystemd link dep. Non-systemd environments (cargo run, custom
# init) silently no-op.
sd-notify = "0.4"

# WASM Component Model runtime. Pinned at 36 because newer releases
# require rustc >= 1.92, while the repo-wide toolchain is 1.90.
wasmtime = { version = "36", features = ["component-model", "async", "cache"] }

# HTTP client for Tier 1/Tier 2 host::network::fetch.
# rustls-tls keeps us off OpenSSL and gives reproducible builds.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
futures-util = "0.3"
base64 = "0.22"

# Arlen workspace dependencies.
arlen-modules = { path = "../../sdk/modules" }
arlen-permissions = { path = "../../sdk/permissions" }
os-sdk = { path = "../../sdk/os-sdk" }
module-sdk = { path = "../../sdk/module-sdk" }
modulesd-proto = { path = "../../contracts/modulesd-proto" }

[dev-dependencies]
tempfile = "3"
wiremock = "0.6"
# The mcp.server dogfood test drives a hosted module through the AI
# daemon's real MCP client, exactly the path the daemon uses.
arlen-ai-core = { path = "../../ai/ai-core" }

[workspace]
