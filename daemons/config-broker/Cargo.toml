[package]
license = "AGPL-3.0-only"
name = "arlen-config-broker"
version = "0.1.0"
edition = "2021"
description = "Config Broker: the separate-uid owner of the security-load-bearing AI master switches"

[lib]
path = "src/lib.rs"

[[bin]]
name = "arlen-config-broker"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal", "io-util"] }
libc = "0.2"
arlen-permissions = { path = "../../sdk/permissions" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"

[workspace]
