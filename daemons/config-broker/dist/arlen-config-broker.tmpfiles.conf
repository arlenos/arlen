# /run/arlen holds the broker's socket. It must be traversable by every local
# user (they connect to the socket) while owned by the broker's uid (only it
# creates entries). systemd's RuntimeDirectory= in the unit creates this too;
# this file makes the ownership explicit for a boot where the unit has not run
# yet, so a client that looks early finds an empty dir rather than a missing one.
d /run/arlen 0755 arlen-config arlen-config -

# The durable state the session user must NOT be able to write. 0700 under the
# broker's uid is the isolation this whole daemon exists to provide.
d /var/lib/arlen 0755 root root -
d /var/lib/arlen/config-broker 0700 arlen-config arlen-config -
