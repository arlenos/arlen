[package]
name = "arlen-consent-broker"
version = "0.1.0"
edition = "2021"
description = "Arlen consent broker: the typed request model + severity classification for the one trusted-path consent surface every system prompt routes through"
authors = ["Arlen"]

[lib]
name = "arlen_consent_broker"

[[bin]]
name = "arlen-consent-broker"
path = "src/main.rs"

[dependencies]
# Reuse the existing decision engine verbatim (do NOT reinvent severity tiers):
# ActionKind / ActionDecision / Capability::decide. The cross-workspace path
# dep mirrors daemons/modulesd.
arlen-ai-core = { path = "../../ai/ai-core" }
# The shared wire contract (request body / class / intake result / outcome),
# re-exported below so a requester deps this thin crate, not the whole broker.
arlen-consent-contract = { path = "../../contracts/consent-contract" }
# Kernel-attested peer identity (SO_PEERCRED -> path_to_app_id) for both sockets.
arlen-permissions = { path = "../../sdk/permissions" }
# The audit ledger sink: each resolved decision is recorded fail-closed before
# the grant is released (S13 audit-before-act).
audit-proto = { path = "../../contracts/audit-proto" }
serde = { version = "1", features = ["derive"] }
# The intake socket frames requests/replies as JSON.
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "signal", "time"] }
libc = "0.2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# The async GrantPersister seam (durable KG grant persistence, best-effort).
async-trait = "0.1"
# The real grant persister wraps the os-sdk graph client (consent grant write op).
os-sdk = { path = "../../sdk/os-sdk" }

[dev-dependencies]
# The in-memory MockAuditSink (accepting / failing) for the resolve fail-closed
# tests; test-util is gated out of any optimized build.
audit-proto = { path = "../../contracts/audit-proto", features = ["test-util"] }
# tokio test-util powers the paused-clock read-timeout test.
tokio = { version = "1", features = ["test-util"] }
