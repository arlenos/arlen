[package]
license = "AGPL-3.0-only"
name = "transfer-daemon"
version = "0.1.0"
edition = "2021"
description = "Arlen transfer daemon: the sole cross-profile broker, default-deny directional policy, dual-ledger audit (org.arlen.Transfer1)"
authors = ["Arlen"]

[lib]
name = "transfer_daemon"

[[bin]]
name = "arlen-transferd"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
toml = "0.8"
thiserror = "1"
serde_json = "1"
async-trait = "0.1"
arlen-permissions = { path = "../../sdk/permissions" }
audit-proto = { path = "../../contracts/audit-proto" }
libc = "0.2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "time", "net", "io-util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
audit-proto = { path = "../../contracts/audit-proto", features = ["test-util"] }

[workspace]
