[package]
license = "AGPL-3.0-only"
name = "arlen-file-manager-mcp"
version = "0.1.0"
edition = "2021"
description = "File Manager read-only MCP server: exposes directory listings and file metadata to the AI daemon over a peer-authenticated MCP socket, scoped fail-closed to a configured allowlist"

[[bin]]
name = "arlen-file-manager-mcp"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
os-sdk = { path = "../../sdk/os-sdk" }
# Capability-based sandboxed filesystem access: reads go through an open
# directory capability, so symlink/`..` escapes are refused at access time via
# openat internally, which closes the check-then-reopen TOCTOU race.
cap-std = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net", "time", "io-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
dirs = "5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"

[workspace]
