# Arlen AI layer config for the SUT dogfood. The ai-daemon (conversational answers)
# and ai-agent (background curation) both read ~/.config/arlen/ai.toml; the arlen
# user owns it via the tmpfiles `Z /home/arlen` chown. This bakes a working,
# offline, local-model AI on first boot so the KG-AI loop can be dogfooded in the VM.

[ai]
# The layer is ON (the dogfood is the point). access_level 3 = TimeScoped: the AI
# may read recent activity + the active project (Foundation §8.4), the generous
# default that makes "what was I working on" answerable. action_mode supervised:
# proposed actions surface for confirmation (the gate/approve flow), never silent.
enabled = true
# access_level 4 = Full. The conversational "what was I working on" only needs
# TimeScoped, but the auto-tag-by-project behaviour declares reads:project, and a
# Project read is a DIFFERENT scope that TimeScoped does not cover - so at level 3
# no behaviour is runnable and the agent exits before it can register AIAgent1 (the
# run_skill/compensate surface the executor live-verify drives). Full covers both.
access_level = 4
action_mode = "supervised"
# The ai-proxy's catalogued local provider; its endpoint is llama-server on
# 127.0.0.1:11434 (the baked GGUF). No cloud, no creds, zero egress.
provider = "ollama-default"

[provider]
# The model id llama-server serves (its --alias); the request's model field.
model = "arlen-default"
context_window = 4096

[agent]
# The background agent runs the deterministic curation behaviour. executor_live is
# ON now that the dogfood conversational loop is confirmed green: it is SAFE because
# an event-triggered action (a file.opened) carries external_content=true, which the
# gate forces to RequireConfirmation - so the agent still auto-writes NOTHING from a
# trigger. A real write happens only through the manual run_skill/approve path
# (external_content=false -> PreviewThenExecute), which is the executor write+undo
# the live-verify exercises against the real graph.
enabled = ["auto-tag-by-project"]
executor_live = true
