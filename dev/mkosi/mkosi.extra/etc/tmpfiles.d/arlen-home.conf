# The postinst's useradd could not chown /home/arlen in mkosi's rootless userns
# ("chown on /home/arlen failed: Invalid argument"), so the home is left
# root-owned and the arlen user cannot chdir into it - greetd then fails the
# session with "unable to set working directory: Permission denied". Fix the
# ownership at boot (systemd-tmpfiles-setup runs before greetd).
Z /home/arlen - arlen arlen -
# A boot-present, arlen-writable project dir the knowledge daemon watches (see
# /root/.config/arlen/graph.toml). It is empty at boot (no project signal), so the
# dogfood's file.opened for a file under it is promoted UNLINKED; the dogfood then
# creates the .project signal at runtime, the watcher detects the Project, and the
# executor write+undo live-verify drives auto-tag to link it (past promotion).
d /home/arlen/work 0755 arlen arlen -
# Pre-create the per-user state dir the ai-agent's ReadWritePaths=%h/.local/state/
# arlen needs: systemd sets up the mount namespace BEFORE the binary runs, so a
# missing dir fails the unit at the NAMESPACE step (the daemon's own create_dir_all
# never gets to run). Each level explicitly - tmpfiles `d` does not make parents.
d /home/arlen/.local 0755 arlen arlen -
d /home/arlen/.local/state 0755 arlen arlen -
d /home/arlen/.local/state/arlen 0700 arlen arlen -
# The dogfood project root for the executor write+undo live-verify. Under /var
# (NOT /home): the SYSTEM knowledge daemon validated /home/arlen as "does not
# exist" at startup (a /home mount-namespace/timing issue), but a /var/lib dir
# created here exists when the daemon validates, is read/watchable by it (ProtectSystem
# =strict leaves it read-only-visible), and is arlen-writable so the dogfood can
# drop the runtime .git signal + the opened file under it.
d /var/lib/arlen-work 0755 arlen arlen -
