# The minimal bootable Arlen image - a Debian Trixie UEFI disk image that boots
# the compositor + shell + daemons + login, run as a QEMU system-under-test to
# verify the whole assembled stack (boot -> QMP-inject -> screendump -> inspect).
# Approach + the ranked hard parts in `docs/architecture/minimal-image-vm-build-plan.md`.
#
# Build:  mkosi --directory dev/mkosi build
# Boot:   mkosi --directory dev/mkosi vm        (a real kernel/DRM path; `boot`/`shell` are nspawn, no GPU)
# or drive it through the verify harness (dev/vm/, QMP screendump + input).
#
# NB on the Arch dev box mkosi defaults to the HOST distro, so [Distribution]
# below is mandatory; ToolsTree=default carries the Debian apt/dpkg/debootstrap.

[Distribution]
Distribution=debian
Release=trixie
# AMD GPU firmware (harmless on the software-GL VM path; needed on real metal).
Repositories=non-free-firmware

[Output]
# Only `disk` carries a GPT + ESP, i.e. a bootable UEFI image; `directory`/`tar`
# are not bootable on their own.
Format=disk
ImageId=arlen

[Content]
# `yes`, never `auto`: auto silently yields a non-bootable image when the kernel
# or bootloader is not pulled in.
Bootable=yes
Bootloader=systemd-boot
# The kernel + sd-boot EFI stub are NOT auto-pulled; name them explicitly. The
# Wayland/Mesa(llvmpipe)/WebKitGTK runtime libs are the stack's display
# dependencies (verify the exact names on a real build, per the plan).
Packages=
        linux-image-amd64
        systemd
        systemd-sysv
        systemd-boot-efi
        udev
        # kmod provides depmod, which the kernel postinst + mkosi's module pass
        # invoke; not pulled implicitly into the rootfs, so name it (first-build
        # finding: "depmod not found" else fails the image at the module step).
        kmod
        dbus-broker
        greetd
        seatd
        libseat1
        fuse3
        # display + GPU (software GL via llvmpipe on the VM's plain virtio-gpu)
        libgl1-mesa-dri
        libegl1
        libgles2
        libwayland-client0
        libwayland-server0
        libwayland-egl1
        libxkbcommon0
        # the Tauri shell/apps run on WebKitGTK
        libwebkit2gtk-4.1-0
        libgtk-3-0
        # a font so OCR/text assertions have glyphs to read
        fonts-dejavu-core

# Dual console: tty0 for the graphical/VGA path (the verify VM's virtio-gpu), and
# ttyS0 so a headless QEMU boot streams the kernel + systemd log to the serial
# port - that is the boot-chain verification channel (UEFI -> systemd-boot ->
# kernel -> systemd -> greetd) before the GPU/screendump path is wired.
# systemd.firstboot=off skips the interactive first-boot wizard (it prompts
# "Press any key to proceed" for locale/hostname/root-password and hangs a
# headless VM); the image ships a baked Hostname below instead.
KernelCommandLine=console=tty0 console=ttyS0,115200 systemd.firstboot=off
Hostname=arlen

[Build]
# CRITICAL on a non-Debian host: carries apt/dpkg/debootstrap so the Debian
# rootfs can be assembled (mkosi#1306). Without it the build fails "apt not found".
ToolsTree=default
# mkosi.build needs network for apt (build deps) + cargo (crate fetch). The build
# overlay is thrown away, so these tools never reach the final image.
WithNetwork=yes
# Mount the arlen repo root (two up from this config dir) into the build at
# $SRCDIR/arlen so mkosi.build.d can compile the Debian-native binaries from
# source; $SRCDIR itself is only this dev/mkosi config dir.
BuildSources=../../:arlen

[Runtime]
# UEFI, not auto - avoids Secure-Boot enrollment friction. KVM=auto falls back to
# TCG where /dev/kvm is absent (CI). The graphics/QMP wiring for the verify pass
# is driven by dev/vm/ (plain virtio-gpu, no gl=on, QMP screendump + usb-tablet),
# not from here, so the framebuffer stays CPU-readable.
Firmware=uefi
KVM=auto
