[package]
name = "arlen-integration"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[dependencies]
tempfile = "3"
arlen-permissions = { path = "../../sdk/permissions" }

[dev-dependencies]
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
prost = "0.13"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v7"] }
os-sdk = { path = "../../sdk/os-sdk" }

[build-dependencies]
prost-build = "0.13"
