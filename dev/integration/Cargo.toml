[package]
name = "arlen-integration"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[dependencies]
tempfile = "3"
arlen-permissions = { path = "../../sdk/permissions" }

[dev-dependencies]
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
prost = "0.13"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v7"] }
os-sdk = { path = "../../sdk/os-sdk" }
arlen-capsule = { path = "../../contracts/capsule" }
audit-proto = { path = "../../contracts/audit-proto" }
# The go-live undo rehearsal drives the agent's `org.arlen.AIAgent1` D-Bus
# interface (completed_actions -> compensate) and parses its JSON replies.
zbus = { version = "5", default-features = false, features = ["tokio"] }
serde_json = "1"

[build-dependencies]
prost-build = "0.13"
