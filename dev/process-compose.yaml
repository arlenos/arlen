# Full Arlen daemon stack for local development.
#   just dev                 the headless daemon core (TUI)
#   just dev -D              detached (scriptable, for verification)
#   just dev --profile shell add the nested compositor + desktop-shell
#
# Run via `just dev`, which sets the working directory to the repo root so the
# relative --manifest-path values resolve. Each daemon's dependents wait on a
# readiness probe (the socket it creates) where one exists, otherwise on the
# dependency having started, so start order matches the real dependency graph.
version: "0.5"

environment:
  - "ARLEN_RUNTIME_DIR=${XDG_RUNTIME_DIR}/arlen"
  - "ARLEN_PRODUCER_SOCKET=${XDG_RUNTIME_DIR}/arlen/event-bus-producer.sock"
  - "ARLEN_CONSUMER_SOCKET=${XDG_RUNTIME_DIR}/arlen/event-bus-consumer.sock"
  - "ARLEN_DAEMON_SOCKET=${XDG_RUNTIME_DIR}/arlen/knowledge.sock"
  # The knowledge daemon BINDS at ARLEN_DAEMON_SOCKET; the ai-agent CONNECTS via
  # ARLEN_KNOWLEDGE_SOCKET (no ARLEN_DAEMON_SOCKET fallback, unlike knowledge-mcp),
  # so set both to the same path or the agent dials the /run/arlen default and
  # cannot reach knowledge in the dev stack.
  - "ARLEN_KNOWLEDGE_SOCKET=${XDG_RUNTIME_DIR}/arlen/knowledge.sock"
  # lbug (Kuzu) vendors thrift C++ that misses <cstdint> on newer GCC.
  - "CXXFLAGS=-include cstdint"
  # Isolate the dev stack's KG data under the (fresh, tmpfs) runtime dir, like the
  # integration harness does. Without this the knowledge daemon falls back to the
  # real `~/.local/share/arlen/{graph,events.db}` - which both clobbers the user's
  # data AND crashes on startup if `~/.local/share/arlen/graph` already exists as a
  # directory (Kuzu wants a file/fresh path: "Database path cannot be a directory"),
  # taking the whole graph (promotion/retention/reads) down with it. Pinning to the
  # runtime dir makes `just dev` reproducible + self-cleaning per session; a dev who
  # wants a persistent graph overrides ARLEN_GRAPH_PATH. Timeline FUSE off (the dev
  # stack exercises the event->graph->read path, not the ~/.timeline view).
  - "ARLEN_DB_PATH=${XDG_RUNTIME_DIR}/arlen/knowledge/events.db"
  - "ARLEN_GRAPH_PATH=${XDG_RUNTIME_DIR}/arlen/knowledge/graph"
  - "ARLEN_TIMELINE_MOUNT=off"
  # Same isolation for the other daemons' WRITTEN state (they fall back to the real
  # ~/.local/share / ~/.local/state otherwise): the audit daemon's HMAC-chained
  # ledger + key (XDG_DATA_HOME/arlen/audit), the anomaly detector's state
  # (XDG_DATA_HOME/arlen/anomaly), the capsule signing key (XDG_STATE_HOME). Audit is
  # the sharp one - it is tamper-detected, so a dev-stack write into the user's REAL
  # ledger chain could trip a false tamper-failure; isolating it keeps `just dev`
  # from touching real state + makes it reproducible. XDG_CONFIG_HOME is deliberately
  # NOT isolated: the dev stack should READ the dev's real ~/.config/arlen (graph.toml
  # watch dirs, ai.toml provider, etc.) - it is read-only intent, no clobber risk.
  - "XDG_DATA_HOME=${XDG_RUNTIME_DIR}/arlen/data"
  - "XDG_STATE_HOME=${XDG_RUNTIME_DIR}/arlen/state"

processes:
  runtime-dir:
    # Also create the knowledge/ subdir: the pinned ARLEN_GRAPH_PATH/ARLEN_DB_PATH
    # below live under it, and the daemon does NOT create an env-pinned path's parent
    # (only the unpinned default), so Kuzu would fail to open graph/ if it is absent.
    command: "mkdir -p ${XDG_RUNTIME_DIR}/arlen/knowledge"
    availability:
      restart: "no"

  event-bus:
    command: "cargo run --manifest-path daemons/event-bus/Cargo.toml"
    depends_on:
      runtime-dir: { condition: process_completed_successfully }
    readiness_probe:
      exec:
        command: "test -S ${ARLEN_PRODUCER_SOCKET} && test -S ${ARLEN_CONSUMER_SOCKET}"
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 30
    availability:
      restart: "on_failure"

  knowledge:
    command: "cargo run --manifest-path daemons/knowledge/Cargo.toml"
    depends_on:
      event-bus: { condition: process_healthy }
    readiness_probe:
      exec:
        command: "test -S ${ARLEN_DAEMON_SOCKET}"
      initial_delay_seconds: 3
      period_seconds: 2
      failure_threshold: 60
    availability:
      restart: "on_failure"

  knowledge-mcp:
    command: "cargo run --manifest-path daemons/knowledge-mcp/Cargo.toml"
    depends_on:
      knowledge: { condition: process_healthy }
    availability:
      restart: "on_failure"

  file-manager-mcp:
    command: "cargo run --manifest-path daemons/file-manager-mcp/Cargo.toml"
    depends_on:
      runtime-dir: { condition: process_completed_successfully }
    availability:
      restart: "on_failure"

  system-monitor-mcp:
    command: "cargo run --manifest-path daemons/system-monitor-mcp/Cargo.toml"
    depends_on:
      runtime-dir: { condition: process_completed_successfully }
    availability:
      restart: "on_failure"

  audit-daemon:
    command: "cargo run --manifest-path daemons/audit-daemon/Cargo.toml"
    depends_on:
      runtime-dir: { condition: process_completed_successfully }
    availability:
      restart: "on_failure"

  notification-daemon:
    command: "cargo run --manifest-path daemons/notification-daemon/Cargo.toml"
    availability:
      restart: "on_failure"

  anomaly-detector:
    command: "cargo run --manifest-path daemons/anomaly-detector/Cargo.toml"
    depends_on:
      event-bus: { condition: process_healthy }
      audit-daemon: { condition: process_started }
    availability:
      restart: "on_failure"

  modulesd:
    command: "cargo run --manifest-path daemons/modulesd/Cargo.toml"
    depends_on:
      event-bus: { condition: process_healthy }
    availability:
      restart: "on_failure"

  # KG sensor array: the observation daemons that feed the graph beyond app
  # events. code-indexer + journald-parser are event-bus consumers/producers with
  # no socket of their own (dependents wait on process_started); capsuled binds a
  # serve socket.
  code-indexer:
    command: "cargo run --manifest-path daemons/code-indexer/Cargo.toml"
    depends_on:
      event-bus: { condition: process_healthy }
      knowledge: { condition: process_healthy }
    availability:
      restart: "on_failure"

  journald-parser:
    command: "cargo run --manifest-path daemons/journald-parser/Cargo.toml"
    depends_on:
      event-bus: { condition: process_healthy }
    availability:
      restart: "on_failure"

  capsuled:
    command: "cargo run --manifest-path daemons/capsuled/Cargo.toml"
    depends_on:
      runtime-dir: { condition: process_completed_successfully }
      audit-daemon: { condition: process_started }
    readiness_probe:
      exec:
        command: "test -S ${XDG_RUNTIME_DIR}/arlen/capsule.sock"
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 30
    availability:
      restart: "on_failure"

  # System-state daemon. power-daemon reads UPower on the system bus, publishes
  # power.state on the event bus (the shell consumes it), and serves a query
  # socket. Resilient to a late/absent UPower (retries per poll, never crashes),
  # so it belongs in the base stack. Its siblings transfer-daemon (needs PR-R1
  # per-uid sockets + two live profile uids) and online-accounts (no value in a
  # bare stack with no accounts) stay systemd/per-uid-scoped, not wired here.
  power-daemon:
    command: "cargo run --manifest-path daemons/power-daemon/Cargo.toml"
    depends_on:
      event-bus: { condition: process_healthy }
    readiness_probe:
      exec:
        command: "test -S ${XDG_RUNTIME_DIR}/arlen/power.sock"
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 30
    availability:
      restart: "on_failure"

  # bridge-ingest (the Obsidian floor) is deliberately NOT a base-stack process:
  # it requires a configured vault to do anything and exits without one. Run it
  # opt-in, e.g.:
  #   ARLEN_BRIDGE_CONFIG=daemons/bridge-ingest/examples/obsidian/bridge.toml \
  #   ARLEN_OBSIDIAN_VAULT=$HOME/Vault \
  #   cargo run --manifest-path daemons/bridge-ingest/Cargo.toml
  # (the entity schema md.obsidian.Note must be in /var/lib/arlen/schemas/ first).

  # The separate-uid owner of the AI master switches (same-uid-isolation
  # Tier-A #1). Binds a SO_PEERPIDFD-authenticated setter socket and seeds the
  # shipped AI defaults into its 0700 store on first run. No hard deps - it
  # serves its own config. In the dev stack it runs as the developer uid
  # (single-uid, so no cross-uid protection here); the dedicated-uid + the
  # /var/lib 0700 provisioning are the deploy/launch-strand step. The AI-layer
  # cutover (clients reading/writing through it) lands with that strand.
  config-broker:
    command: "cargo run --manifest-path daemons/config-broker/Cargo.toml"
    depends_on:
      runtime-dir: { condition: process_completed_successfully }
    readiness_probe:
      exec:
        command: "test -S ${XDG_RUNTIME_DIR}/arlen/config-broker.sock"
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 30
    availability:
      restart: "on_failure"

  ai-daemon:
    command: "cargo run --manifest-path ai/ai-daemon/Cargo.toml"
    depends_on:
      knowledge: { condition: process_healthy }
      audit-daemon: { condition: process_started }
    availability:
      restart: "on_failure"

  ai-agent:
    command: "cargo run --manifest-path ai/ai-agent/Cargo.toml"
    depends_on:
      knowledge: { condition: process_healthy }
      audit-daemon: { condition: process_started }
    availability:
      restart: "on_failure"

  # The graphical layer (compositor + desktop-shell) and the portal stack live in
  # process-compose.shell.yaml / process-compose.portal.yaml and are composed in by
  # `just dev --profile shell` / `--profile portal`. They are kept out of this base
  # file because the pinned process-compose (v1.40.1) ignores the `profiles:` field,
  # so profile gating is done by composing config files, not by a --profile flag.
