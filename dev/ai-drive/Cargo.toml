[package]
name = "arlen-ai-drive"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-only"
description = "Dev dogfood tool: drive the ai-engine daemon's shell socket and print the event stream"

[[bin]]
name = "arlen-ai-drive"
path = "src/main.rs"

[dependencies]
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "time"] }

[workspace]
