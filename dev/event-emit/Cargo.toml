[package]
name = "arlen-event-emit"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-only"
description = "Dev dogfood tool: inject a synthetic event into the Arlen event bus"

[[bin]]
name = "arlen-event-emit"
path = "src/main.rs"

[dependencies]
os-sdk = { path = "../../sdk/os-sdk" }
prost = "0.13"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[workspace]
