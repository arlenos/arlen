# Arlen Theme: Panda (Default)
#
# Reference implementation of the Arlen theme format (Blueprint Section 6.13).
# Copy this file to ~/.config/arlen/theme.toml and edit to customize.
#
# Schema overview:
#   [color]         Surface and semantic colors as hex strings (#RRGGBB or #RRGGBBAA)
#   [motion]        Animation durations (ms) and easing curves (CSS cubic-bezier)
#   [depth]         Shadow definitions and blur settings
#   [wm]            Compositor window-management tokens (radius, gaps, hints)
#   [typography]    Font families, size, weight, line height
#   [cursor]        Cursor theme name and size
#   [wallpaper]     Wallpaper declaration (static, dynamic, or video)
#   [sounds]        System sound file paths (relative to theme package)
#
# All fields are optional. Missing fields fall back to the built-in Panda
# defaults compiled into arlen-theme. A theme that sets only [color.accent]
# inherits everything else from Panda.
#
# Design: dark shell (#09090b), light apps (#ffffff). The shell recedes;
# the application is the focus.

# ============================================================
# Color tokens
# ============================================================

[color.bg]
shell   = "#09090b"     # topbar, sidebar, dock
app     = "#ffffff"     # application window background
card    = "#f5f5f7"     # cards, elevated elements within apps
overlay = "#00000080"   # popups, modals, dropdowns (50% alpha)
input   = "#f0f0f0"     # text fields, search inputs

[color.fg]
primary   = "#1a1a2e"   # primary text
secondary = "#6b7280"   # secondary and metadata text
disabled  = "#9ca3af"   # disabled state

[color]
accent  = "#09090b"     # interactive elements, active state
border  = "#e2e2e8"     # dividers and outlines
error   = "#ef4444"     # error state
warning = "#f59e0b"     # warning state
success = "#22c55e"     # success state

# ============================================================
# Motion tokens
# ============================================================

[motion]
duration_short  = 120       # ms, micro-interactions
duration_medium = 200       # ms, standard transitions
duration_long   = 350       # ms, page transitions
easing_default  = "cubic-bezier(0.4, 0, 0.2, 1)"
easing_enter    = "cubic-bezier(0.0, 0.0, 0.2, 1)"
easing_exit     = "cubic-bezier(0.4, 0.0, 1.0, 1)"
easing_spring   = "cubic-bezier(0.34, 1.56, 0.64, 1)"

# ============================================================
# Depth tokens (shadows and blur)
# ============================================================

[depth]
shadow_active   = "0 8px 32px rgba(0,0,0,0.4)"
shadow_inactive = "0 2px 8px rgba(0,0,0,0.15)"
shadow_popup    = "0 4px 16px rgba(0,0,0,0.3)"
blur_panels     = "12px"
blur_popups     = "8px"
blur_enabled    = true      # false for High Contrast theme

# ============================================================
# Window manager tokens (compositor-side)
# ============================================================

[wm]
radius      = 8.0       # corner radius in logical pixels
active_hint = 0          # focus indicator thickness (0 to disable)
gaps        = 4          # tiling gap size in logical pixels
is_dark     = false      # app surface is light in Panda
# window_hint = "#ff0000" # optional custom hint color, omit for accent

# ============================================================
# Typography
# ============================================================

[typography]
font_sans           = "Inter"
font_mono           = "JetBrains Mono"
font_size           = 14.0          # base size in px
font_weight_regular = 400
font_weight_bold    = 600
font_lineheight     = 1.5

# ============================================================
# Cursor
# ============================================================

[cursor]
theme = "default"
size  = 24

# ============================================================
# Wallpaper
# ============================================================

[wallpaper]
type = "static"
file = "wallpapers/panda.jpg"

# ============================================================
# Sounds
# ============================================================

[sounds]
notification = "sounds/notification.ogg"
error        = "sounds/error.ogg"
warning      = "sounds/warning.ogg"
