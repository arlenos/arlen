[package]
name = "arlen-forage-signing"
version = "0.1.0"
edition = "2021"
description = "Persistent builder signing key for forage (fail-closed 0600 Ed25519 keypair)"

[lib]
path = "src/lib.rs"

[dependencies]
ed25519-dalek = { version = "2", features = ["std", "zeroize"] }
getrandom = "0.2"
thiserror = "2"
zeroize = "1"

[dev-dependencies]
tempfile = "3"

[workspace]
