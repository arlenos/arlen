[package]
name = "arlen-cookbook-resolve"
version = "0.1.0"
edition = "2021"
description = "Verify a signed forage cookbook against a TOFU-pinned root and resolve a recipe to its pinned pointer"

[lib]
path = "src/lib.rs"

[dependencies]
arlen-forage-recipe = { path = "../../contracts/forage-recipe" }
tough = "0.22"
serde_json = "1"
hex = "0.4"
url = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs"] }
thiserror = "2"

[dev-dependencies]
arlen-cookbook-sign = { path = "../cookbook-sign" }
arlen-cookbook-index = { path = "../cookbook-index" }
chrono = { version = "0.4", features = ["clock"] }
sha2 = "0.10"
tempfile = "3"

[workspace]
