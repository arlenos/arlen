[package]
license = "AGPL-3.0-only"
name = "arlen-forage-fetch"
version = "0.1.0"
edition = "2021"
description = "Fixed-output source fetch for forage: SSRF-guarded, hash-verified into the content-addressed store"

[lib]
path = "src/lib.rs"

[dependencies]
arlen-net-guard = { path = "../../sdk/net-guard" }
arlen-forage-store = { path = "../store" }
arlen-forage-recipe = { path = "../../contracts/forage-recipe" }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
tokio = { version = "1", features = ["rt", "net", "time"] }
futures-util = "0.3"
async-trait = "0.1"
thiserror = "2"
tempfile = "3"
wait-timeout = "0.2"
tar = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
arlen-forage-extract = { path = "../extract" }

[workspace]
