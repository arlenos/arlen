[package]
license = "AGPL-3.0-only"
name = "arlen-forage-package"
version = "0.1.0"
edition = "2021"
description = "Artifact collection for forage: gather only the declared [artifacts] into a .lunpkg staging tree (anti-scooping)"

[lib]
path = "src/lib.rs"

[dependencies]
arlen-forage-recipe = { path = "../../contracts/forage-recipe" }
thiserror = "2"
toml = "0.8"
serde = { version = "1", features = ["derive"] }
tar = "0.4"
zstd = "0.13"
ed25519-dalek = { version = "2", features = ["std"] }
sha2 = "0.10"

[dev-dependencies]
tempfile = "3"

[workspace]
