name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # lbug (Kuzu) vendors thrift C++ that misses <cstdint> on newer GCC.
  CXXFLAGS: "-include cstdint"
  # Keep the target dir small: the knowledge build is disk-heavy enough to
  # crash the linker on a default runner. CI needs neither debug symbols nor
  # incremental rebuilds.
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  # Decide which components actually need building. The common case (editing one
  # crate) then runs only that crate's leg instead of all of them. A change to
  # anything shared falls back to the full matrix so a contract or lockfile
  # change still rebuilds every dependent: rust goes full on a Cargo lockfile/
  # manifest, the toolchain, .cargo, .github, contracts/, or any sdk/ crate
  # except sdk/ui-kit; frontend goes full on .github or sdk/ui-kit (the shared
  # component library). When the diff base is unknown (a new branch, a
  # force-push, the first run) or the run was triggered manually both go full,
  # which is the safe default.
  changes:
    name: detect changed components
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          RUST_ALL='["contracts/audit-proto","contracts/notification-proto","contracts/modulesd-proto","contracts/graph-schema","contracts/forage-recipe","contracts/capsule","contracts/artifact","contracts/lenv","sdk","sdk/config-format","ai","daemons/event-bus","daemons/knowledge","daemons/notification-daemon","daemons/audit-daemon","daemons/anomaly-detector","daemons/modulesd","daemons/installd","daemons/knowledge-mcp","daemons/file-manager-mcp","daemons/system-monitor-mcp","daemons/xdg-portal","daemons/capsuled","daemons/arlen-run","daemons/online-accounts","daemons/power-daemon","daemons/journald-parser","daemons/code-indexer","daemons/print","daemons/transfer-daemon","daemons/lock-auth","daemons/wallpaper","daemons/integration-packages","forage","forage/store","forage/fetch","forage/build","forage/package","forage/extract","forage/pipeline","forage/signing","forage/patch","forage/capabilities","forage/cookbook-index","forage/cookbook-sign","forage/cookbook-resolve","apps/terminal/core","apps/terminal/engine","apps/files/core","dev/integration"]'
          FRONT_ALL='["apps/settings","apps/harness","apps/desktop-shell","apps/terminal","apps/files","apps/greeter","sdk/ui-kit"]'

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE"; head="$PR_HEAD"
          else
            base="$BEFORE"; head="$SHA"
          fi

          base_unknown=0
          # A manual dispatch has no diff base; run the full matrix.
          [ "$EVENT_NAME" = "workflow_dispatch" ] && base_unknown=1
          changed=""
          if [ "$base_unknown" = "1" ] || [ -z "$base" ] || echo "$base" | grep -qE '^0+$'; then
            base_unknown=1
          else
            changed="$(git diff --name-only "$base" "$head" 2>/dev/null || true)"
            [ -z "$changed" ] && base_unknown=1
          fi

          rust_full=$base_unknown
          frontend_full=$base_unknown
          if [ "$base_unknown" = "0" ]; then
            if grep -qE '^(Cargo\.(lock|toml)|rust-toolchain|\.cargo/|\.github/|contracts/)' <<< "$changed"; then
              rust_full=1
            fi
            # any sdk/ change except under sdk/ui-kit/ is a shared rust change
            if grep -E '^sdk/' <<< "$changed" | grep -qvE '^sdk/ui-kit/'; then
              rust_full=1
            fi
            if grep -qE '^(\.github/|sdk/ui-kit/)' <<< "$changed"; then
              frontend_full=1
            fi
          fi

          changed_json="$(printf '%s' "$changed" | jq -R . | jq -cs .)"
          # sdk/ui-kit lives under sdk/ but is a frontend component, not part of
          # the sdk rust workspace, so it must not pull in the sdk rust leg. The
          # rust subset matches against the change list with ui-kit paths removed.
          changed_rust="$(printf '%s' "$changed" | grep -vE '^sdk/ui-kit/' || true)"
          changed_rust_json="$(printf '%s' "$changed_rust" | jq -R . | jq -cs .)"

          if [ "$rust_full" = "1" ]; then
            rust="$RUST_ALL"
          else
            rust="$(printf '%s' "$changed_rust_json" | jq -c --argjson all "$RUST_ALL" \
              '. as $ch | $all | map(select(. as $c | $ch | any(startswith($c + "/"))))')"
          fi
          if [ "$frontend_full" = "1" ]; then
            frontend="$FRONT_ALL"
          else
            frontend="$(printf '%s' "$changed_json" | jq -c --argjson all "$FRONT_ALL" \
              '. as $ch | $all | map(select(. as $c | $ch | any(startswith($c + "/"))))')"
          fi

          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "rust components: $rust"
          echo "frontend apps: $frontend"

  rust:
    name: rust check + test
    needs: changes
    if: ${{ needs.changes.outputs.rust != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.changes.outputs.rust) }}
    steps:
      - uses: actions/checkout@v4
      - name: free disk space
        # The knowledge crate vendors a large C++ graph engine (lbug); linking
        # it can exhaust a default runner's disk and crash the linker with a
        # bus error. Reclaim the preinstalled toolchains we do not use.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - name: system deps
        # cmake + nasm build AWS-LC, which aws-lc-rs (pulled in by the tough TUF
        # library, used by forage/cookbook-sign) compiles from C source.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler build-essential pkg-config cmake nasm \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libssl-dev libdbus-1-dev fuse3 libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.component }}
      - name: check
        run: cargo check --manifest-path ${{ matrix.component }}/Cargo.toml
      - name: test
        run: |
          # installd and knowledge tests mutate process-global state (env vars,
          # a single on-disk graph) and must run serially to avoid races.
          extra=""
          case "${{ matrix.component }}" in
            daemons/installd|daemons/knowledge) extra="-- --test-threads=1" ;;
          esac
          cargo test --manifest-path ${{ matrix.component }}/Cargo.toml --no-fail-fast $extra

  lint:
    name: clippy + rustfmt
    needs: changes
    if: ${{ needs.changes.outputs.rust != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler build-essential pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libdbus-1-dev libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Format + lint the SDK and AI layer as representative; widen later.
      - name: rustfmt check
        run: |
          for c in sdk ai daemons/event-bus contracts/audit-proto; do
            cargo fmt --manifest-path "$c/Cargo.toml" --all --check || true
          done
      - name: clippy (sdk, ai)
        run: |
          cargo clippy --manifest-path sdk/Cargo.toml --workspace || true
          cargo clippy --manifest-path ai/Cargo.toml --workspace || true

  frontend:
    name: frontend svelte-check
    needs: changes
    if: ${{ needs.changes.outputs.frontend != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.frontend) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The apps use npm (package-lock.json). Skip where there is none.
      - name: check
        working-directory: ${{ matrix.app }}
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run check || true
          else
            echo "no package.json, skipping"
          fi
