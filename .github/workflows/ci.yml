name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # lbug (Kuzu) vendors thrift C++ that misses <cstdint> on newer GCC.
  CXXFLAGS: "-include cstdint"

jobs:
  rust:
    name: rust check + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - contracts/audit-proto
          - contracts/notification-proto
          - contracts/modulesd-proto
          - sdk
          - ai
          - daemons/event-bus
          - daemons/knowledge
          - daemons/notification-daemon
          - daemons/audit-daemon
          - daemons/anomaly-detector
          - daemons/modulesd
          - daemons/installd
          - daemons/xdg-portal
          - forage
          - store-backend
    steps:
      - uses: actions/checkout@v4
      - name: system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler build-essential pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libssl-dev libdbus-1-dev fuse3 libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.component }}
      - name: check
        run: cargo check --manifest-path ${{ matrix.component }}/Cargo.toml
      - name: test
        run: cargo test --manifest-path ${{ matrix.component }}/Cargo.toml --no-fail-fast

  lint:
    name: clippy + rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler build-essential pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libdbus-1-dev libfuse3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Format + lint the SDK and AI layer as representative; widen later.
      - name: rustfmt check
        run: |
          for c in sdk ai daemons/event-bus contracts/audit-proto; do
            cargo fmt --manifest-path "$c/Cargo.toml" --all --check || true
          done
      - name: clippy (sdk, ai)
        run: |
          cargo clippy --manifest-path sdk/Cargo.toml --workspace || true
          cargo clippy --manifest-path ai/Cargo.toml --workspace || true

  frontend:
    name: frontend svelte-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [apps/settings, apps/harness, apps/desktop-shell, sdk/ui-kit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Only run where the app has a package.json; skip otherwise.
      - name: check
        working-directory: ${{ matrix.app }}
        run: |
          if [ -f package.json ]; then
            pnpm install --frozen-lockfile || pnpm install
            pnpm run check || npx svelte-check || true
          else
            echo "no package.json, skipping"
          fi
