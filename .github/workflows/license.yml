name: license

# License hygiene (licensing-strategy.md): gate the dependency tree's licenses
# with cargo-deny and run the REUSE/SPDX lint, via `just lint-licenses`. Separate
# from ci.yml so the license gate is independent of the build matrix. cargo-deny
# only resolves the dependency graph (no compilation), so this is cheap. The first
# run reconciles deny.toml's allowlist against the real resolved tree; `reuse lint`
# gates against REUSE.toml, which licenses the tree by the per-component map.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: license-${{ github.ref }}
  cancel-in-progress: true

jobs:
  licenses:
    name: license hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,just
      - name: install reuse
        run: pipx install reuse
      - name: lint-licenses
        run: just --justfile dev/justfile lint-licenses

  notices:
    name: third-party notices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: install cargo-bundle-licenses
        run: cargo install cargo-bundle-licenses --locked
      # Non-gating: the NOTICES artifact is informational, and the exact
      # bundle-licenses invocation reconciles on a host with the tool.
      - name: generate notices
        continue-on-error: true
        run: just --justfile dev/justfile notices
      - uses: actions/upload-artifact@v4
        with:
          name: third-party-notices
          path: THIRD-PARTY-NOTICES/
          if-no-files-found: ignore
